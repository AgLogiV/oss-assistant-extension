<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>OBB Materials Dashboard - Admin</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="wrap">
      <div class="topbar">
        <div class="brand">
          OBB Materials Dashboard
          <small>Manage materials + images</small>
        </div>
        <div class="row">
          <button id="logoutBtn" type="button">Logout</button>
        </div>
      </div>

      <div class="card">
        <div class="row">
          <input id="idInput" placeholder="Material Id (digits)" style="width:180px" />
          <input id="nameInput" placeholder="Short name" style="flex:1;min-width:260px" />
          <select id="catInput" style="width:180px">
            <option value="internet">Интернет</option>
            <option value="tv">Телевизия</option>
            <option value="other" selected>Други</option>
          </select>
          <button id="addBtn" class="primary" type="button">Add / Update</button>
        </div>
        <div id="msg" class="msg"></div>
        <div class="hint">Add/Update работи по Material Id (само цифри). Images: Upload или Save URL.</div>

        <table class="table">
          <thead>
            <tr>
              <th style="width:90px">Image</th>
              <th style="width:140px">Material Id</th>
              <th>Name</th>
              <th style="width:420px">Image actions</th>
              <th style="width:120px">Actions</th>
            </tr>
          </thead>
          <tbody id="list"></tbody>
        </table>
      </div>
    </div>

    <script src="admin.js"></script>
  </body>
</html>
