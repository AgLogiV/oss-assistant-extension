<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>OBB Materials Dashboard - Login</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="wrap">
      <div class="topbar">
        <div class="brand">
          OBB Materials Dashboard
          <small>Admin access required</small>
        </div>
      </div>

      <div class="card" style="max-width:520px;margin:0 auto">
        <div style="font-weight:800;margin-bottom:10px">Въведи Admin token</div>
        <div class="row">
          <input id="token" type="password" placeholder="Admin token" style="flex:1;min-width:240px" />
          <button id="loginBtn" class="primary" type="button">Вход</button>
        </div>
        <div class="hint">Token-ът се пази само в този браузър (session).</div>
        <div id="msg" class="msg"></div>
      </div>
    </div>

    <script src="login.js"></script>
  </body>
</html>
